<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reed</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px; width: 300px; background: #fafafa; color: #222;
      }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px 12px; border-bottom: 1px solid #eee; background: white;
      }
      header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
      #open-btn {
        font-size: 12px; color: #666; text-decoration: none;
        padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; background: white;
      }
      #open-btn:hover { background: #f0f0f0; }
      #save-btn {
        display: block; width: 100%; padding: 10px;
        background: #1a1a1a; color: white; border: none;
        border-radius: 8px; font-size: 14px; font-weight: 600;
        cursor: pointer; transition: background 0.15s;
      }
      #save-btn:hover { background: #333; }
      #save-btn:disabled { background: #aaa; cursor: default; }
      #status {
        margin-top: 10px; padding: 10px 12px; border-radius: 8px;
        font-size: 13px; line-height: 1.4; display: none;
      }
      #status.success { background: #e6f4ea; color: #1a7a3a; }
      #status.duplicate { background: #fff8e1; color: #7a5c00; }
      #status.error { background: #fdecea; color: #b00020; }
      #status .label { font-weight: 600; margin-bottom: 2px; }
      #status .detail { color: inherit; opacity: 0.85; word-break: break-word; }
      #offline-warning {
        margin-top: 10px; padding: 8px 12px; background: #fdecea;
        color: #b00020; border-radius: 8px; font-size: 12px; display: none;
      }
      .footer { padding: 14px 16px; }
      #recents { border-top: 1px solid #eee; }
      #recents h2 {
        font-size: 11px; font-weight: 600; text-transform: uppercase;
        letter-spacing: 0.5px; color: #999; padding: 10px 16px 6px;
      }
      .article-item {
        display: flex; align-items: flex-start; gap: 10px;
        padding: 8px 16px; border-bottom: 1px solid #f2f2f2;
        text-decoration: none; color: inherit;
      }
      .article-item:hover { background: #f5f5f5; }
      .article-item:last-child { border-bottom: none; }
      .article-thumb {
        width: 36px; height: 36px; border-radius: 5px;
        object-fit: cover; flex-shrink: 0; background: #e8e8e8;
      }
      .article-info { flex: 1; min-width: 0; }
      .article-title {
        font-size: 13px; font-weight: 500; line-height: 1.3;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .article-meta { font-size: 11px; color: #999; margin-top: 2px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Reed</h1>
      <a id="open-btn" href="http://localhost:8765" target="_blank">Open Reed</a>
    </header>
    <div class="footer">
      <button id="save-btn">Save this page</button>
      <div id="offline-warning">Reed backend is not running on port 8765.</div>
      <div id="status">
        <div class="label" id="status-label"></div>
        <div class="detail" id="status-detail"></div>
      </div>
    </div>
    <div id="recents">
      <h2>Recently saved</h2>
      <div id="recents-list"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
