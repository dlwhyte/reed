name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs when a branch is force-pushed so a rapid-fire
# sequence doesn't queue multiple redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - name: npm audit (critical, prod deps only)
        # Threshold is `critical` rather than `high` because @capacitor/cli
        # v6 pulls a vulnerable `tar` transitively and the fix requires a
        # two-major-version jump (v8.3+). That's a build-time-only risk,
        # tracked as a follow-up. Revisit once @capacitor/* is bumped.
        run: npm audit --omit=dev --audit-level=critical

  backend:
    name: Backend (pytest + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Run pytest
        env:
          COHERE_API_KEY: ""
          ENABLE_LLM: "false"
          DATA_DIR: /tmp/readerdata
        run: pytest -v
      - name: pip-audit (Python deps)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend (backend serves dist/)
        working-directory: frontend
        env:
          # Skip Clerk in the e2e build — the backend honors the matching
          # E2E_AUTH_BYPASS env var set in playwright.config.ts.
          VITE_E2E_BYPASS: "true"
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke test
        working-directory: frontend
        run: npx playwright test
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
