// ─────────────────────────────────────────────────────────────
// Tweaks — single persistent block; host rewrites on set_keys
// ─────────────────────────────────────────────────────────────
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "terracotta",
  "density": "mixed",
  "readerTheme": "light",
  "readerFont": "serif",
  "readerSize": 18
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = React.useState(TWEAKS);
  const [editing, setEditing] = React.useState(false);

  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditing(true);
      if (d.type === '__deactivate_edit_mode') setEditing(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function set(key, value) {
    setT(prev => ({ ...prev, [key]: value }));
    window.parent.postMessage({
      type: '__edit_mode_set_keys',
      edits: { [key]: value },
    }, '*');
  }
  return { t, editing, set };
}

const ACCENT_OPTIONS = {
  terracotta: REED.terracotta,
  plum: REED.plum,
  olive: REED.olive,
  ink: REED.ink,
};

function TweakPanel({ t, set }) {

        color: REED.inkFaint, textTransform: 'uppercase', marginBottom: 6,
      }}>{label}</div>
      {children}
    </div>
  );
  const Pill = ({ on, onClick, children }) => (
    <button onClick={onClick} style={{
      padding: '5px 12px', borderRadius: 999, cursor: 'pointer',
      fontFamily: REED.sans, fontSize: 11, fontWeight: 500,
      background: on ? REED.ink : 'transparent',
      color: on ? '#fff' : REED.inkMuted,
      border: `1px solid ${on ? REED.ink : REED.rule}`,
    }}>{children}</button>
  );
  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, width: 280, zIndex: 1000,
      background: REED.paperRaised, borderRadius: REED.r.lg, padding: 18,
      border: `1px solid ${REED.rule}`,
      boxShadow: '0 10px 40px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.06)',
      fontFamily: REED.sans,
    }}>
      <div style={{
        fontFamily: REED.display, fontSize: 18, fontWeight: 600,
        letterSpacing: -0.3, marginBottom: 14, display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <span style={{ color: REED.terracotta }}>✦</span>
        Tweaks
      </div>

      <Row label="accent">
        <div style={{ display: 'flex', gap: 8 }}>
          {Object.entries(ACCENT_OPTIONS).map(([k, c]) => (
            <button key={k} onClick={() => set('accent', k)} title={k} style={{
              width: 28, height: 28, borderRadius: '50%', cursor: 'pointer',
              background: c,
              border: `2px solid ${t.accent === k ? REED.ink : 'transparent'}`,
              boxShadow: '0 1px 2px rgba(0,0,0,0.1)',
            }}/>
          ))}
        </div>
      </Row>

      <Row label="library density">
        <div style={{ display: 'flex', gap: 6 }}>
          {['mixed', 'card', 'list'].map(d => (
            <Pill key={d} on={t.density === d} onClick={() => set('density', d)}>{d}</Pill>
          ))}
        </div>
      </Row>

      <Row label="reader theme">
        <div style={{ display: 'flex', gap: 6 }}>
          {['light', 'sepia', 'dark'].map(th => (
            <Pill key={th} on={t.readerTheme === th} onClick={() => set('readerTheme', th)}>{th}</Pill>
          ))}
        </div>
      </Row>

      <Row label="reader font">
        <div style={{ display: 'flex', gap: 6 }}>
          {['serif', 'sans'].map(f => (
            <Pill key={f} on={t.readerFont === f} onClick={() => set('readerFont', f)}>{f}</Pill>
          ))}
        </div>
      </Row>

      <Row label={`reader size · ${t.readerSize}px`}>
        <input type="range" min={14} max={22} value={t.readerSize}
          onChange={e => set('readerSize', Number(e.target.value))}
          style={{ width: '100%', accentColor: REED.terracotta }}/>
      </Row>
    </div>
  );
}

function LibraryPrototype({ density, onOpen }) {
  return <Library density={density} onOpen={onOpen}/>;
}

function DesktopApp({ tweaks }) {
  const [route, setRoute] = React.useState(() => {
    const saved = localStorage.getItem('reed.route');
    if (saved) { try { return JSON.parse(saved); } catch (e) {} }
    return { name: 'library' };
  });
  React.useEffect(() => {
    localStorage.setItem('reed.route', JSON.stringify(route));
  }, [route]);

  if (route.name === 'reader') {
    return (
      <Reader
        articleId={route.articleId}
        embedded
        theme={tweaks.readerTheme}
        fontKind={tweaks.readerFont}
        size={tweaks.readerSize}
        onBack={() => setRoute({ name: 'library' })}
      />
    );
  }
  return (
    <Library
      density={tweaks.density}
      onOpen={(id) => setRoute({ name: 'reader', articleId: id })}
    />
  );
}
